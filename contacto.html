<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piedrahita SAS — Contacto</title>
<style>
:root{--black:#000;--black-soft:#0a0a0a;--charcoal:#131313;--line:rgba(255,255,255,0.08);--line-strong:rgba(255,255,255,0.16);--white:#f5f3f0;--grey:#8a8a8a;--orange:#f0750f;--orange-deep:#c75a08;--ease:cubic-bezier(0.16,1,0.3,1);--ease-soft:cubic-bezier(0.25,0.46,0.45,0.94);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'Helvetica Neue',Arial,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
::selection{background:var(--orange);color:var(--black);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--black);}::-webkit-scrollbar-thumb{background:var(--orange-deep);}
a{color:inherit;text-decoration:none;}img{display:block;max-width:100%;}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.container{max-width:1400px;margin:0 auto;padding:0 56px;}
.eyebrow{font-size:11px;letter-spacing:0.32em;text-transform:uppercase;color:var(--orange);font-weight:600;}
.hairline{height:1px;background:var(--line);}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:20px 56px;transition:background .5s var(--ease),padding .5s var(--ease),border-color .5s var(--ease);border-bottom:1px solid transparent;}
.nav.scrolled{background:rgba(0,0,0,0.9);backdrop-filter:blur(18px);padding:12px 56px;border-bottom:1px solid var(--line);}
.nav-logo img{height:48px;width:auto;object-fit:contain;transition:height .4s;}
.nav.scrolled .nav-logo img{height:36px;}
.nav-links{display:flex;align-items:center;gap:40px;}
.nav-link{font-size:13px;letter-spacing:0.04em;color:var(--white);position:relative;padding:6px 0;opacity:0.75;transition:opacity .3s,color .3s;}
.nav-link:hover{opacity:1;}
.nav-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--orange);transition:width .35s var(--ease);}
.nav-link:hover::after,.nav-link.active::after{width:100%;}
.nav-link.active{opacity:1;color:var(--orange);}
.nav-cta{border:1px solid var(--line-strong);padding:10px 22px;font-size:12px;letter-spacing:0.06em;border-radius:30px;transition:border-color .3s,background .3s,color .3s;}
.nav-cta:hover{border-color:var(--orange);background:var(--orange);color:var(--black);}
.nav-burger{display:none;flex-direction:column;gap:5px;width:28px;z-index:1001;}
.nav-burger span{height:1.5px;width:100%;background:var(--white);transition:transform .3s,opacity .3s;display:block;}
.nav-burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.nav-burger.open span:nth-child(2){opacity:0;}
.nav-burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .9s var(--ease),transform .9s var(--ease);}
.reveal.in{opacity:1;transform:translateY(0);}
.delay-1{transition-delay:.12s;}.delay-2{transition-delay:.24s;}.delay-3{transition-delay:.36s;}.delay-4{transition-delay:.48s;}

/* CONTACT PAGE */
.contact-page{flex:1;position:relative;overflow:hidden;}
.contact-bg-glow{position:absolute;bottom:-20%;left:50%;width:1200px;height:1200px;transform:translateX(-50%);background:radial-gradient(circle,rgba(240,117,15,0.11) 0%,transparent 65%);pointer-events:none;}

.contact-hero{padding:170px 0 80px;text-align:center;}
.contact-hero h1{font-size:clamp(34px,6vw,80px);font-weight:600;line-height:1.1;margin-top:18px;}

.contact-grid{display:grid;grid-template-columns:repeat(2,1fr);max-width:820px;margin:90px auto 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.contact-card{padding:50px 32px;display:flex;flex-direction:column;align-items:center;gap:14px;border-right:1px solid var(--line);transition:background .3s;cursor:pointer;}
.contact-card:last-child{border-right:none;}
.contact-card:hover{background:rgba(240,117,15,0.06);}
.cc-icon{width:46px;height:46px;object-fit:contain;margin-bottom:4px;}
.cc-label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--orange);font-weight:600;}
.cc-value{font-size:15px;word-break:break-word;text-align:center;}

.contact-social{display:flex;justify-content:center;align-items:center;gap:28px;margin-top:60px;padding-top:50px;border-top:1px solid var(--line);color:var(--grey);}
.contact-social a{transition:color .3s,transform .3s;display:flex;align-items:center;}
.contact-social a:hover{color:var(--orange);transform:translateY(-3px);}
.social-img{width:26px;height:26px;object-fit:contain;filter:brightness(0) invert(1) opacity(0.5);transition:filter .3s;}
.contact-social a:hover .social-img{filter:brightness(0) invert(1) opacity(1);}

.contact-footer{margin-top:100px;padding-bottom:48px;text-align:center;}
.contact-footer p{font-size:12px;color:rgba(255,255,255,0.25);margin-top:18px;}

@media(max-width:980px){
  .nav{padding:16px 20px;}.nav.scrolled{padding:10px 20px;}
  .container{padding:0 20px;}
  .nav-links{position:fixed;top:0;right:0;height:100vh;width:78vw;max-width:300px;background:rgba(0,0,0,0.97);backdrop-filter:blur(20px);flex-direction:column;justify-content:center;gap:28px;transform:translateX(100%);transition:transform .5s var(--ease);border-left:1px solid var(--line);}
  .nav-links.open{transform:translateX(0);}
  .nav-link{font-size:20px;}.nav-cta{display:none;}.nav-burger{display:flex;}
  .contact-grid{grid-template-columns:1fr;}
  .contact-card{border-right:none;border-bottom:1px solid var(--line);}
  .contact-card:last-child{border-bottom:none;}
}
</style>
</head>
<body>

<nav class="nav" id="nav">
  <a href="index.html" class="nav-logo">
    <img src="https://piedrahitasas.com/wp-content/uploads/2023/09/logo-cdp-2023_Mesa-de-trabajo-1-copia-11.png" alt="Piedrahita SAS">
  </a>
  <div class="nav-links" id="navLinks">
    <a href="index.html" class="nav-link">Inicio</a>
    <a href="nosotros.html" class="nav-link">Nosotros</a>
    <a href="proyectos.html" class="nav-link">Proyectos</a>
    <a href="contacto.html" class="nav-link active">Contacto</a>
  </div>
  <a href="https://api.whatsapp.com/send/?phone=573106509774" target="_blank" class="nav-cta">Contáctanos</a>
  <button class="nav-burger" id="navBurger" aria-label="Menú"><span></span><span></span><span></span></button>
</nav>

<main class="contact-page">
  <div class="contact-bg-glow"></div>
  <div class="container">

    <div class="contact-hero">
      <span class="eyebrow reveal">Hablemos</span>
      <h1 class="reveal delay-1">Hagamos realidad<br>tu próximo espacio.</h1>
    </div>

    <div class="contact-grid">
      <a href="https://api.whatsapp.com/send/?phone=573106509774&text=Bienvenido+a+Piedrahita+SAS.+%C2%BFC%C3%B3mo+te+puedo+asesorar%3F&type=phone_number&app_absent=0" target="_blank" class="contact-card reveal delay-2">
        <img class="cc-icon" src="https://piedrahitasas.com/wp-content/uploads/2025/10/Diseno-sin-titulo.png" alt="Teléfono">
        <span class="cc-label">Llámanos</span>
        <span class="cc-value">+57 310 6509774</span>
      </a>
      <a href="mailto:sebastianpiedrahita@piedrahitasas.com" class="contact-card reveal delay-3">
        <img class="cc-icon" src="https://piedrahitasas.com/wp-content/uploads/2026/06/logoandfondo-1.png" alt="Correo">
        <span class="cc-label">Escríbenos</span>
        <span class="cc-value">sebastianpiedrahita@piedrahitasas.com</span>
      </a>
    </div>

    <div class="contact-social reveal delay-4">
      <a href="https://www.instagram.com/piedrahitasas/" target="_blank" aria-label="Instagram">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
      <a href="https://www.facebook.com/profile.php?id=61552080357136" target="_blank" aria-label="Facebook">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 9h3V5h-3c-2.2 0-4 1.8-4 4v2H7v4h3v6h4v-6h3l1-4h-4V9c0-.6.4-1 1-1z"/></svg>
      </a>
      <a href="https://www.tiktok.com/@piedrahita.sas" target="_blank" aria-label="TikTok">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M16 3c.5 2.3 2 3.8 4 4v3c-1.6 0-3-.5-4-1.3V14a5 5 0 1 1-5-5v3a2 2 0 1 0 2 2V3h3z"/></svg>
      </a>
      <a href="https://piedrahitasas.com/wp-content/uploads/2025/09/v.png" target="_blank" aria-label="Otra red">
        <img class="social-img" src="https://piedrahitasas.com/wp-content/uploads/2025/09/v.png" alt="Red social">
      </a>
    </div>

    <div class="contact-footer reveal delay-5">
      <div class="hairline"></div>
      <p>© 2026 Piedrahita SAS. Todos los derechos reservados.</p>
    </div>

  </div>
</main>

<script>
(function(){
  const nav=document.getElementById('nav');
  window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>50),{passive:true});
  const burger=document.getElementById('navBurger');
  const links=document.getElementById('navLinks');
  burger.addEventListener('click',()=>{burger.classList.toggle('open');links.classList.toggle('open');});
  links.querySelectorAll('a').forEach(l=>l.addEventListener('click',()=>{burger.classList.remove('open');links.classList.remove('open');}));
  const ro=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});},{threshold:0.1});
  setTimeout(()=>document.querySelectorAll('.reveal').forEach(el=>ro.observe(el)),100);
})();
</script>
</body>
</html>
