<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piedrahita SAS — Proyectos</title>
<style>
:root{--black:#000;--black-soft:#0a0a0a;--charcoal:#131313;--line:rgba(255,255,255,0.08);--line-strong:rgba(255,255,255,0.16);--white:#f5f3f0;--grey:#8a8a8a;--orange:#f0750f;--orange-deep:#c75a08;--ease:cubic-bezier(0.16,1,0.3,1);--ease-soft:cubic-bezier(0.25,0.46,0.45,0.94);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'Helvetica Neue',Arial,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
::selection{background:var(--orange);color:var(--black);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--black);}::-webkit-scrollbar-thumb{background:var(--orange-deep);}
a{color:inherit;text-decoration:none;}img{display:block;max-width:100%;}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.container{max-width:1400px;margin:0 auto;padding:0 56px;}
.eyebrow{font-size:11px;letter-spacing:0.32em;text-transform:uppercase;color:var(--orange);font-weight:600;}
.hairline{height:1px;background:var(--line);}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:20px 56px;transition:background .5s var(--ease),padding .5s var(--ease),border-color .5s var(--ease);border-bottom:1px solid transparent;}
.nav.scrolled{background:rgba(0,0,0,0.9);backdrop-filter:blur(18px);padding:12px 56px;border-bottom:1px solid var(--line);}
.nav-logo img{height:48px;width:auto;object-fit:contain;transition:height .4s;}
.nav.scrolled .nav-logo img{height:36px;}
.nav-links{display:flex;align-items:center;gap:40px;}
.nav-link{font-size:13px;letter-spacing:0.04em;color:var(--white);position:relative;padding:6px 0;opacity:0.75;transition:opacity .3s,color .3s;}
.nav-link:hover{opacity:1;}
.nav-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--orange);transition:width .35s var(--ease);}
.nav-link:hover::after,.nav-link.active::after{width:100%;}
.nav-link.active{opacity:1;color:var(--orange);}
.nav-cta{border:1px solid var(--line-strong);padding:10px 22px;font-size:12px;letter-spacing:0.06em;border-radius:30px;transition:border-color .3s,background .3s,color .3s;}
.nav-cta:hover{border-color:var(--orange);background:var(--orange);color:var(--black);}
.nav-burger{display:none;flex-direction:column;gap:5px;width:28px;z-index:1001;}
.nav-burger span{height:1.5px;width:100%;background:var(--white);transition:transform .3s,opacity .3s;display:block;}
.nav-burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.nav-burger.open span:nth-child(2){opacity:0;}
.nav-burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .8s var(--ease),transform .8s var(--ease);}
.reveal.in{opacity:1;transform:translateY(0);}
.delay-1{transition-delay:.1s;}.delay-2{transition-delay:.2s;}.delay-3{transition-delay:.3s;}.delay-4{transition-delay:.4s;}.delay-5{transition-delay:.5s;}

/* PAGE HEADER */
.page-header{padding:170px 0 80px;text-align:center;}
.page-header h1{font-size:clamp(32px,5vw,62px);font-weight:600;line-height:1.15;margin-top:16px;}

/* PROJECTS GRID */
.proy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:120px;}
.proy-tile{position:relative;aspect-ratio:4/5;overflow:hidden;cursor:pointer;}
.proy-tile-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .8s var(--ease-soft),filter .5s;}
.proy-tile:hover .proy-tile-bg{transform:scale(1.06);filter:brightness(0.55);}
.proy-tile-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,0.88) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:32px;}
.proy-tile-name{font-size:17px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.proy-tile-sub{font-size:12px;color:var(--orange);letter-spacing:0.1em;margin-top:5px;transform:translateY(6px);opacity:0;transition:transform .4s var(--ease),opacity .4s;}
.proy-tile:hover .proy-tile-sub{transform:translateY(0);opacity:1;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:2000;display:flex;align-items:stretch;opacity:0;pointer-events:none;transition:opacity .4s,background .4s;}
.modal-overlay.open{opacity:1;pointer-events:auto;background:rgba(0,0,0,0.92);}
.modal{position:fixed;inset:0;overflow-y:auto;z-index:2001;opacity:0;transform:translateY(30px);transition:opacity .5s var(--ease),transform .5s var(--ease);pointer-events:none;}
.modal.open{opacity:1;transform:translateY(0);pointer-events:auto;}

.modal-close{position:fixed;top:28px;right:32px;z-index:2100;width:48px;height:48px;border-radius:50%;border:1px solid var(--line-strong);background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--white);transition:border-color .3s,background .3s;}
.modal-close:hover{border-color:var(--orange);background:rgba(240,117,15,0.15);}

.modal-inner{min-height:100vh;display:grid;grid-template-columns:320px 1fr;background:var(--black);}
.modal-sidebar{padding:120px 40px 60px;border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow-y:auto;}
.modal-sidebar h2{font-size:clamp(26px,3vw,36px);font-weight:700;line-height:1.1;margin-bottom:8px;}
.modal-sidebar .loc{font-size:13px;color:var(--grey);margin-bottom:36px;}
.modal-meta-item{margin-bottom:22px;}
.modal-meta-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:4px;}
.modal-meta-value{font-size:15px;}
.modal-gallery{padding:100px 50px 60px;display:grid;grid-template-columns:1fr 1fr;gap:4px;align-content:start;}
.modal-gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;transition:transform .5s var(--ease-soft);}
.modal-gallery img:hover{transform:scale(1.02);}
.modal-gallery img:first-child{grid-column:1/-1;aspect-ratio:16/9;}

@media(max-width:980px){
  .nav{padding:16px 20px;}.nav.scrolled{padding:10px 20px;}
  .container{padding:0 20px;}
  .nav-links{position:fixed;top:0;right:0;height:100vh;width:78vw;max-width:300px;background:rgba(0,0,0,0.97);backdrop-filter:blur(20px);flex-direction:column;justify-content:center;gap:28px;transform:translateX(100%);transition:transform .5s var(--ease);border-left:1px solid var(--line);}
  .nav-links.open{transform:translateX(0);}
  .nav-link{font-size:20px;}.nav-cta{display:none;}.nav-burger{display:flex;}
  .proy-grid{grid-template-columns:1fr 1fr;gap:3px;}
  .modal-inner{grid-template-columns:1fr;}
  .modal-sidebar{position:relative;height:auto;padding:100px 24px 40px;}
  .modal-gallery{padding:20px 24px 60px;grid-template-columns:1fr;}
  .modal-gallery img:first-child{aspect-ratio:4/3;}
}
@media(max-width:560px){.proy-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav class="nav" id="nav">
  <a href="index.html" class="nav-logo">
    <img src="https://piedrahitasas.com/wp-content/uploads/2023/09/logo-cdp-2023_Mesa-de-trabajo-1-copia-11.png" alt="Piedrahita SAS">
  </a>
  <div class="nav-links" id="navLinks">
    <a href="index.html" class="nav-link">Inicio</a>
    <a href="nosotros.html" class="nav-link">Nosotros</a>
    <a href="proyectos.html" class="nav-link active">Proyectos</a>
    <a href="contacto.html" class="nav-link">Contacto</a>
  </div>
  <a href="https://api.whatsapp.com/send/?phone=573106509774" target="_blank" class="nav-cta">Contáctanos</a>
  <button class="nav-burger" id="navBurger" aria-label="Menú"><span></span><span></span><span></span></button>
</nav>

<div class="page-header container">
  <span class="eyebrow reveal">Portafolio</span>
  <h1 class="reveal delay-1">Creamos entornos que inspiran<br>y conectan con tu marca.</h1>
</div>

<div class="proy-grid container" id="proyGrid">

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay"></div>
<div class="modal" id="modal" role="dialog" aria-modal="true">
  <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
  <div class="modal-inner">
    <div class="modal-sidebar" id="modalSidebar"></div>
    <div class="modal-gallery" id="modalGallery"></div>
  </div>
</div>

  },
  {
    id:'avianca',
    name:'Avianca',
    location:'Bogotá, Colombia',
    pisos:'1 piso',
    alcance:'Diseño y construcción',
    duracion:'6 meses',
    cover:'https://piedrahitasas.com/wp-content/uploads/2026/06/avianca1.jpg',
    images:[
      'https://piedrahitasas.com/wp-content/uploads/2026/06/avianca1.jpg',

      'https://piedrahitasas.com/wp-content/uploads/2026/06/avianca5.jpg',
      'https://piedrahitasas.com/wp-content/uploads/2026/06/avianca2.jpg',
    ]
  },
];

// Render grid
const grid = document.getElementById('proyGrid');
PROJECTS.forEach((p,i)=>{
  const tile = document.createElement('div');
  tile.className='proy-tile reveal'+(i>0?` delay-${Math.min(i,5)}`:'');
  tile.id=p.id;
  tile.innerHTML=`
    <div class="proy-tile-bg" style="background-image:url('${p.cover}')"></div>
    <div class="proy-tile-overlay">
      <span class="proy-tile-name">${p.name}</span>
      <span class="proy-tile-sub">Ver proyecto →</span>
    </div>`;
  tile.addEventListener('click',()=>openModal(p));
  grid.appendChild(tile);
});

// Modal
const overlay=document.getElementById('modalOverlay');
const modal=document.getElementById('modal');
const modalClose=document.getElementById('modalClose');
const modalSidebar=document.getElementById('modalSidebar');
const modalGallery=document.getElementById('modalGallery');

function openModal(p){
  modalSidebar.innerHTML=`
    <h2>${p.name}</h2>
    <p class="loc">${p.location}</p>
    <div class="modal-meta-item"><div class="modal-meta-label">Proyecto</div><div class="modal-meta-value">${p.pisos}</div></div>
    <div class="modal-meta-item"><div class="modal-meta-label">Ubicación</div><div class="modal-meta-value">${p.location}</div></div>
    <div class="modal-meta-item"><div class="modal-meta-label">Alcance</div><div class="modal-meta-value">${p.alcance}</div></div>
    <div class="modal-meta-item"><div class="modal-meta-label">Duración</div><div class="modal-meta-value">${p.duracion}</div></div>`;

  modalGallery.innerHTML=p.images.map((src,i)=>`<img src="${src}" alt="${p.name} ${i+1}" loading="lazy">`).join('');

  overlay.classList.add('open');
  modal.classList.add('open');
  document.body.style.overflow='hidden';
  modal.scrollTop=0;
  history.pushState(null,'','#'+p.id);
}

function closeModal(){
  overlay.classList.remove('open');
  modal.classList.remove('open');
  document.body.style.overflow='';
  history.pushState(null,'',window.location.pathname);
}

overlay.addEventListener('click',closeModal);
modalClose.addEventListener('click',closeModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// NAV
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>50),{passive:true});
const burger=document.getElementById('navBurger');
const navLinks=document.getElementById('navLinks');
burger.addEventListener('click',()=>{burger.classList.toggle('open');navLinks.classList.toggle('open');});

// Reveal
const ro=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});},{threshold:0.1});
setTimeout(()=>document.querySelectorAll('.reveal').forEach(el=>ro.observe(el)),100);

// Open modal from hash (when coming from index)
function checkHash(){
  const hash=location.hash.replace('#','');
  if(hash){const p=PROJECTS.find(x=>x.id===hash);if(p)openModal(p);}
}
window.addEventListener('load',checkHash);
</script>

</html>
